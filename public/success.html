<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Successful - Specter LSAT Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-10 text-center">
    <div id="loading" class="text-gray-500 text-lg">Activating your plan...</div>
    <div id="success" class="hidden">
      <div class="text-6xl mb-4">🎉</div>
      <h1 class="text-3xl font-bold text-gray-800 mb-3">You're all set!</h1>
      <p class="text-gray-600 mb-2" id="plan-msg"></p>
      <p class="text-gray-500 text-sm mb-8">Your account has been upgraded. Go back and log in to access your new features.</p>
      <a href="/" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-indigo-700 inline-block">Go to App</a>
    </div>
    <div id="error" class="hidden">
      <div class="text-5xl mb-4">⚠️</div>
      <h1 class="text-2xl font-bold text-gray-800 mb-3">Something went wrong</h1>
      <p class="text-gray-500 mb-6">Your payment may have gone through. Please contact support@specterlsat.com</p>
      <a href="/" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-300 inline-block">Back to App</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const plan = params.get('plan');
    const username = params.get('username');

    async function activate() {
      if (!sessionId) { showError(); return; }
      try {
        const res = await fetch('/api/session-status?session_id=' + sessionId);
        const data = await res.json();
        if (data.status === 'paid' && data.plan) {
          if (username) {
            const userKey = 'u_' + username;
            const stored = localStorage.getItem(userKey);
            if (stored) {
              const user = JSON.parse(stored);
              user.hasTestAccess = true;
              if (data.plan === 'premium') user.isPremium = true;
              localStorage.setItem(userKey, JSON.stringify(user));
              const session = localStorage.getItem('su');
              if (session) {
                const su = JSON.parse(session);
                if (su.username === username) {
                  su.hasTestAccess = true;
                  if (data.plan === 'premium') su.isPremium = true;
                  localStorage.setItem('su', JSON.stringify(su));
                }
              }
            }
          }
          const planLabel = data.plan === 'premium' ? 'Premium Access ($45/month)' : 'Test Access ($35/month)';
          document.getElementById('plan-msg').textContent = 'Plan activated: ' + planLabel;
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('success').classList.remove('hidden');
        } else {
          showError();
        }
      } catch (e) { showError(); }
    }

    function showError() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }

    activate();
  </script>
</body>
</html>
